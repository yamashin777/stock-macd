// ── 銘柄スキャン ────────────────────────────────────────────────────────────
const _SCAN_LS_KEY = 'scanData_v1';
const _SCAN_LS_TTL = 24 * 3600 * 1000;  // 24時間

function _saveScanCache(data) {
  try { localStorage.setItem(_SCAN_LS_KEY, JSON.stringify({ ...data, _ts: Date.now() })); } catch(e) {}
}
function _loadScanCache() {
  try {
    const raw = localStorage.getItem(_SCAN_LS_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (Date.now() - (d._ts || 0) < _SCAN_LS_TTL) return d;
  } catch(e) {}
  return null;
}

let scanData    = null;
let scanFilter  = 'gc3';
let scanSortKey = 'gc';   // 'gc' | 'ticker' | 'price' | 'change' | 'signal'
let scanSortDir = -1;     // -1=降順, 1=昇順

const SCAN_SIG_RANK = { '買い':0, '上昇トレンド':1, '様子見':2, '下降トレンド':3, '売り':4 };

function setScanSort(key) {
  if (scanSortKey === key) {
    scanSortDir *= -1;
  } else {
    scanSortKey = key;
    scanSortDir = key === 'gc' ? -1 : 1;  // GCは新しい順、他は昇順をデフォルト
  }
  renderScanView();
}

let _scanPolling = false;

async function loadScan(force = false) {
  if (!force) {
    const cached = _loadScanCache();
    if (cached) {
      scanData = cached;
      document.getElementById('scan-toolbar').style.display = '';
      renderScanView();
      return;
    }
  }
  document.getElementById('scan-toolbar').style.display = 'none';
  _showScanLoading(0, null);
  _scanPolling = true;
  await _pollScan(force, Date.now());
}

function _showScanLoading(elapsed, d) {
  const el  = document.getElementById('scan-content');
  const sec = Math.round(elapsed / 1000);
  const min = Math.floor(sec / 60);
  const s   = sec % 60;
  const elapsedStr = sec > 0 ? (min > 0 ? `${min}分${s}秒` : `${sec}秒`) : '';

  const phase        = d && d.phase            || '';
  const total        = d && d.total            || 0;
  const done         = d && d.done             || 0;
  const curTicker    = d && d.current          || '';
  const curName      = d && d.current_name     || curTicker;
  const earnTotal    = d && d.earn_total       || 0;
  const earnDone     = d && d.earn_done        || 0;
  const earnCurName  = d && d.earn_current_name|| (d && d.earn_current) || '';

  let phaseLabel = '📡 スキャン準備中…';
  let pct = 0;
  let countText = '';
  let curLabel  = '';

  if (phase === 'prices') {
    phaseLabel = '📊 MACDデータ取得中';
    pct        = total > 0 ? (done / total) * 100 : 0;
    countText  = total > 0 ? `${done} / ${total} 銘柄 (${Math.round(pct)}%)` : '';
    curLabel   = curName || curTicker;
  } else if (phase === 'prices_done' || phase === 'cooldown') {
    phaseLabel = '⏳ クールダウン中（レート制限リセット待ち）';
    pct        = 100;
    countText  = `MACDデータ取得完了 (100%) — 決算日取得を準備中`;
  } else if (phase === 'earnings') {
    phaseLabel = '📅 決算日取得中';
    pct        = earnTotal > 0 ? (earnDone / earnTotal) * 100 : 0;
    countText  = earnTotal > 0 ? `${earnDone} / ${earnTotal} 銘柄 (${Math.round(pct)}%)` : '';
    curLabel   = earnCurName;
  }

  const pctRounded = Math.min(Math.round(pct), 100);
  const bar = `
    <div style="background:var(--border);border-radius:4px;height:7px;
                width:240px;margin:10px auto 6px;overflow:hidden">
      <div style="background:var(--blue);width:${pctRounded}%;
                  height:100%;border-radius:4px;transition:width .4s"></div>
    </div>`;

  el.innerHTML = `<div class="sig-empty" style="padding:32px 0;line-height:1.8">
    <div style="font-size:14px;font-weight:600;margin-bottom:2px">${phaseLabel}</div>
    ${bar}
    ${countText ? `<div style="font-size:12px;color:var(--muted)">${countText}</div>` : ''}
    ${curLabel  ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">処理中: <span style="color:var(--blue);font-weight:600">${curLabel}</span></div>` : ''}
    <div style="font-size:11px;color:var(--muted);margin-top:8px;opacity:.7">${elapsedStr ? `経過 ${elapsedStr}` : 'スキャン開始中…'}</div>
  </div>`;
}

async function _pollScan(force, startTime) {
  if (!_scanPolling) return;
  try {
    const url = _pq(`/api/scan${force ? '?force=true' : ''}`);
    const res  = await fetch(url);
    const data = await res.json();

    if (data.status === 'done') {
      _scanPolling = false;
      scanData = data;
      _saveScanCache(data);
      renderScanView();
    } else {
      // まだ実行中 → 3秒後に再確認
      _showScanLoading(Date.now() - startTime, data);
      setTimeout(() => _pollScan(false, startTime), 3000);
    }
  } catch(e) {
    _scanPolling = false;
    document.getElementById('scan-content').innerHTML =
      `<div class="sig-empty">エラーが発生しました: ${e.message}</div>`;
  }
}

function setScanFilter(f) {
  scanFilter = f;
  ['gc3','gc6','all'].forEach((v,i) => {
    document.getElementById(`sf-${i+1}`).classList.toggle('on', v === f);
  });
  renderScanView();
}

// ── SVGスパークライン生成 ─────────────────────────────────────────────────────
function sparklineSVG(closes, macdHist, w, h) {
  if (!closes || closes.length < 2) return `<svg width="${w}" height="${h}"></svg>`;
  const pH = Math.round(h * 0.62);   // 価格エリア高さ
  const mH = Math.round(h * 0.32);   // MACDエリア高さ
  const gap = h - pH - mH;           // 仕切り余白
  const n = closes.length;
  const step = w / (n - 1);

  // ── 価格ライン ──
  const minC = Math.min(...closes), maxC = Math.max(...closes);
  const rangeC = maxC - minC || 1;
  const pts = closes.map((c, i) => {
    const x = (i * step).toFixed(1);
    const y = (pH - ((c - minC) / rangeC) * (pH - 2) - 1).toFixed(1);
    return `${x},${y}`;
  }).join(' ');

  // 塗りつぶし用パス（ライン + 下端クローズ）
  const firstX = '0', lastX = ((n-1)*step).toFixed(1);
  const fillPath = `M${firstX},${pH} ` +
    closes.map((c,i) => {
      const x = (i * step).toFixed(1);
      const y = (pH - ((c - minC) / rangeC) * (pH - 2) - 1).toFixed(1);
      return `L${x},${y}`;
    }).join(' ') +
    ` L${lastX},${pH} Z`;

  // 上昇・下降で色分け
  const priceUp = closes[n-1] >= closes[0];
  const lineCol = priceUp ? '#3fb950' : '#f85149';
  const fillCol = priceUp ? 'rgba(63,185,80,0.12)' : 'rgba(248,81,73,0.12)';

  // ── MACDヒストグラム ──
  let macdSVG = '';
  if (macdHist && macdHist.length === n) {
    const maxAbs = Math.max(...macdHist.map(Math.abs), 0.0001);
    const barW = Math.max(1.5, step - 1);
    const baseY = pH + gap + mH;
    macdSVG = macdHist.map((v, i) => {
      const bh = (Math.abs(v) / maxAbs) * mH;
      const x  = (i * step - barW / 2).toFixed(1);
      const y  = v >= 0 ? (baseY - bh).toFixed(1) : baseY.toFixed(1);
      const col = v >= 0 ? '#3fb950' : '#f85149';
      return `<rect x="${x}" y="${y}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}" opacity="0.75"/>`;
    }).join('');
  }

  // 仕切り線
  const divY = (pH + gap / 2).toFixed(1);

  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="display:block">
    <path d="${fillPath}" fill="${fillCol}"/>
    <polyline points="${pts}" fill="none" stroke="${lineCol}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="0" y1="${divY}" x2="${w}" y2="${divY}" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    ${macdSVG}
  </svg>`;
}

function renderScanView() {
  if (!scanData) return;
  const el = document.getElementById('scan-content');
  const toolbar = document.getElementById('scan-toolbar');
  toolbar.style.display = 'flex';

  // 更新日時
  const updEl = document.getElementById('scan-updated');
  if (scanData.updated_at) {
    const d = new Date(scanData.updated_at * 1000);
    updEl.textContent = `更新: ${d.toLocaleDateString('ja-JP')} ${d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}${scanData.cached ? '（キャッシュ）' : ''}`;
  }

  const wl = new Set(order);

  // フィルタ
  let items = (scanData.results || []).filter(d => {
    const ago = monthsAgo(d.last_gc);
    if (scanFilter === 'gc3') return ago !== null && ago <= 3;
    if (scanFilter === 'gc6') return ago !== null && ago <= 6;
    return true;
  });

  // ソート
  items.sort((a, b) => {
    let va, vb;
    if (scanSortKey === 'gc') {
      if (!a.last_gc && !b.last_gc) return 0;
      if (!a.last_gc) return 1;
      if (!b.last_gc) return -1;
      return scanSortDir * b.last_gc.localeCompare(a.last_gc) * -1;
    } else if (scanSortKey === 'ticker') {
      va = a.ticker; vb = b.ticker;
      return scanSortDir * va.localeCompare(vb, 'ja');
    } else if (scanSortKey === 'price') {
      va = a.current_price; vb = b.current_price;
      return scanSortDir * (va - vb);
    } else if (scanSortKey === 'change') {
      va = a.change_pct; vb = b.change_pct;
      return scanSortDir * (va - vb);
    } else if (scanSortKey === 'signal') {
      va = SCAN_SIG_RANK[a.signal] ?? 5;
      vb = SCAN_SIG_RANK[b.signal] ?? 5;
      return scanSortDir * (va - vb);
    } else if (scanSortKey === 'earnings') {
      // nullは後ろ
      if (!a.next_earnings && !b.next_earnings) return 0;
      if (!a.next_earnings) return 1;
      if (!b.next_earnings) return -1;
      return scanSortDir * a.next_earnings.localeCompare(b.next_earnings);
    }
    return 0;
  });

  if (!items.length) {
    el.innerHTML = '<div class="sig-empty">該当する銘柄がありません。フィルターを変更してください。</div>';
    return;
  }

  function scanRowHTML(d) {
    const s = sym(d.currency);
    const cc = d.change >= 0 ? 'pos' : 'neg';
    const sgn = d.change >= 0 ? '+' : '';
    const cfg = sigCfg(d.signal);
    const displayName = (d.custom_name && d.custom_name.trim()) ? d.custom_name : d.name;
    const secChip = d.sector ? `<span class="scan-sector-chip">${escapeHtml(d.sector)}</span>` : '';
    const extUrl = externalUrl(d.symbol, d.ticker);
    const inWL = wl.has(d.ticker);
    const gcAgo = monthsAgo(d.last_gc);
    const gcCell = d.last_gc
      ? `<span class="sig-date-gc">${d.last_gc}</span><br><span class="sig-months-ago">${gcAgo}M前</span>`
      : '<span class="sig-date-none">—</span>';
    const addBtn = inWL
      ? `<span class="in-wl-badge">✓ 登録済</span>`
      : `<button class="btn-add-wl" id="scan-add-${d.ticker}" onclick="scanAddToWL(event,'${d.ticker}')">＋ WL</button>`;

    const safeT2 = d.ticker.replace(/'/g, "\\'");
    const memoTxt = d.memo
      ? `<span style="color:var(--muted)">📝 ${escapeHtml(d.memo)}</span>`
      : `<span style="color:var(--border)">📝 メモ追加</span>`;
    const memoEl = `<div id="scan-memo-${d.ticker}" class="scan-memo-cell" onclick="scanEditMemo(event,'${safeT2}',this)">${memoTxt}</div>`;

    const chart = d.chart_close
      ? `<div class="scan-inline-chart">${sparklineSVG(d.chart_close, d.chart_macd_hist, 110, 40)}</div>`
      : '';

    // 週足MACDによる早期シグナル（週足が実際に買い/売りクロスを起こし、月足が未確定の場合のみ）
    let earlyBadge = '';
    if (isEarlySignal(d)) {
      const wcfg = sigCfg(d.weekly_signal);
      earlyBadge = `<span class="early-mini-badge" title="週足MACDでは月足と異なる動き（${escapeHtml(d.weekly_signal)}）を検知">⚡週足:${wcfg.lbl}</span>`;
    }

    // 次回決算日までの日数
    let earnCell = '<span style="color:var(--muted)">—</span>';
    if (d.next_earnings) {
      const today = new Date(); today.setHours(0,0,0,0);
      const eDate = new Date(d.next_earnings); eDate.setHours(0,0,0,0);
      const days  = Math.round((eDate - today) / 86400000);
      if (days >= 0) {
        const cls  = days <= 7 ? 'earn-imminent' : days <= 30 ? 'earn-soon' : days <= 60 ? 'earn-moderate' : '';
        const label = days === 0 ? '本日' : `${days}日後`;
        earnCell = `<span class="${cls}">${label}</span><br><span style="font-size:10px;color:var(--muted)">${d.next_earnings.slice(5)}</span>`;
      }
    }

    return `<tr>
      <td>
        <div class="scan-name-chart">
          <div class="scan-name-info">
            <div class="sig-name">
              <a class="ext-link" style="font-size:11px;margin-right:4px" href="${extUrl}" target="_blank" rel="noopener noreferrer">↗</a>
              ${escapeHtml(displayName)}
            </div>
            <span class="badge ${cfg.cls} scan-sig-badge scan-badge-mob" onclick="setScanSort('signal')" title="シグナルでソート" style="font-size:9px;padding:1px 5px">${cfg.lbl}</span>
            <div class="sig-ticker-row">
              <span class="sig-ticker">${d.ticker}</span>
              <span class="badge ${cfg.cls} scan-sig-badge scan-badge-desk" onclick="setScanSort('signal')" title="シグナルでソート" style="font-size:9px;padding:1px 5px;margin-left:4px">${cfg.lbl}</span>
            </div>
            ${secChip}
            ${earlyBadge}
            ${memoEl}
          </div>
          ${chart}
        </div>
      </td>
      <td class="sig-price">${s}${fmtPrice(d.current_price, d.currency)}<br>
        <span class="${cc}" style="font-size:11px">${sgn}${d.change_pct.toFixed(2)}%</span></td>
      <td class="scan-gc-cell">${gcCell}</td>
      <td class="scan-earn-td" style="white-space:nowrap;font-size:12px;text-align:center">${earnCell}</td>
      <td>${addBtn}</td>
    </tr>`;
  }

  // ソートインジケーター
  function thSort(key, label, extraCls = '') {
    const active = scanSortKey === key;
    const arrow = active ? (scanSortDir === 1 ? ' ▲' : ' ▼') : ' ⇅';
    const cls = ['scan-th-sort', active ? 'sort-active' : '', extraCls].filter(Boolean).join(' ');
    return `<th class="${cls}" onclick="setScanSort('${key}')">${label}<span class="sort-arrow">${arrow}</span></th>`;
  }

  el.innerHTML = `
    <div class="sig-section">
      <div class="sig-section-title">📡 スキャン結果 — ${items.length}銘柄</div>
      <table class="sig-table scan-table">
        <colgroup>
          <col>
          <col style="width:100px">
          <col style="width:88px">
          <col style="width:72px">
          <col style="width:74px">
        </colgroup>
        <thead><tr>
          ${thSort('ticker','銘柄')}
          ${thSort('price','現在値','scan-price-th')}
          ${thSort('gc','最終GC','scan-gc-th')}
          ${thSort('earnings','決算', 'scan-earn-th')}
          <th></th>
        </tr></thead>
        <tbody>${items.map(scanRowHTML).join('')}</tbody>
      </table>
    </div>`;
}

// ── スキャンリスト管理 ──────────────────────────────────────────────────────
let scanListData = { default_count: 0, custom: [], auto: [], auto_updated_at: 0, total: 0 };

async function loadScanList() {
  try {
    const res = await fetch(_pq('/api/scan-list'));
    scanListData = await res.json();
    if (!scanListData.auto) scanListData.auto = [];
    renderScanMgmt();
    const el = document.getElementById('scan-total');
    if (el) el.textContent = `対象: ${scanListData.total}銘柄`;
  } catch(e) {}
}

function toggleScanMgmt() {
  const el = document.getElementById('scan-mgmt');
  el.classList.toggle('open');
  if (el.classList.contains('open')) renderScanMgmt();
}

function renderScanMgmt() {
  // 合計統計
  const stats = document.getElementById('scan-mgmt-stats');
  if (stats) stats.textContent =
    `デフォルト: ${scanListData.default_count}銘柄　自動: ${(scanListData.auto||[]).length}銘柄　手動: ${scanListData.custom.length}銘柄　合計: ${scanListData.total}銘柄`;

  // 自動取得セクション
  const autoEl = document.getElementById('scan-auto-info');
  if (autoEl) {
    const auto = scanListData.auto || [];
    if (auto.length === 0) {
      autoEl.innerHTML = `<span style="color:var(--muted)">まだ取得されていません。「🔄 取得・更新」で値上がり上位を自動登録できます。</span>`;
    } else {
      const updStr = scanListData.auto_updated_at
        ? new Date(scanListData.auto_updated_at * 1000).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
        : '';
      autoEl.innerHTML = `<span style="color:var(--green)">${auto.length}銘柄を自動登録済み</span>
        ${updStr ? `<span style="margin-left:8px">(更新: ${updStr})</span>` : ''}
        <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">
          ${auto.slice(0, 20).map(t => `<span style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:11px">${escapeHtml(t)}</span>`).join('')}
          ${auto.length > 20 ? `<span style="font-size:11px;color:var(--muted);padding:2px 8px">… 他${auto.length-20}銘柄</span>` : ''}
        </div>`;
    }
  }

  // 手動追加セクション
  const listEl = document.getElementById('scan-custom-list');
  if (!listEl) return;
  if (!scanListData.custom.length) {
    listEl.innerHTML = '<span style="font-size:12px;color:var(--muted)">手動で追加した銘柄はありません</span>';
    return;
  }
  listEl.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">手動追加済み（×で削除）:</div>
    <div class="scan-custom-list">
      ${scanListData.custom.map(t => `
        <span class="scan-custom-tag">
          ${escapeHtml(t)}
          <button onclick="scanListRemove('${t}')" title="削除">×</button>
        </span>`).join('')}
    </div>`;
}

async function refreshAutoScanList() {
  const btn = document.getElementById('btn-auto-refresh');
  if (btn) { btn.disabled = true; btn.textContent = '取得中…'; }
  try {
    const res = await fetch('/api/auto-scan-list/refresh', { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      scanListData.auto = data.auto || [];
      scanListData.auto_updated_at = data.auto_updated_at || 0;
      scanListData.total = data.total;
      renderScanMgmt();
      const el = document.getElementById('scan-total');
      if (el) el.textContent = `対象: ${data.total}銘柄`;
      // スキャンキャッシュが無効化されたので再スキャン
      scanData = null;
      loadScan(true);
    } else {
      alert('取得に失敗しました: ' + (data.error || ''));
    }
  } catch(e) {
    alert('エラー: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 取得・更新'; }
  }
}

async function scanListAdd() {
  const input = document.getElementById('scan-add-input');
  const val = input.value.trim();
  if (!val) return;
  input.disabled = true;
  try {
    const res = await fetch('/api/scan-list', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_pb({ ticker: val })),
    });
    const data = await res.json();
    if (data.success) {
      scanListData.custom = data.custom;
      scanListData.total  = data.total;
      input.value = '';
      renderScanMgmt();
      document.getElementById('scan-total').textContent = `対象: ${data.total}銘柄`;
    } else {
      alert(data.error || '追加に失敗しました');
    }
  } catch(e) {
    alert('エラー: ' + e.message);
  } finally {
    input.disabled = false;
    input.focus();
  }
}

async function scanListRemove(ticker) {
  if (!confirm(`「${ticker}」をスキャンリストから削除しますか？`)) return;
  try {
    const res = await fetch(_pq(`/api/scan-list/${ticker}`), { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      scanListData.custom = data.custom;
      scanListData.total  = data.total;
      renderScanMgmt();
      document.getElementById('scan-total').textContent = `対象: ${data.total}銘柄`;
    }
  } catch(e) {}
}

// スキャン管理入力のEnterキー対応
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('scan-add-input');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') scanListAdd(); });

  // プロファイルバッジ表示
  if (_PROFILE) {
    const badge = document.getElementById('profile-badge');
    const name  = document.getElementById('profile-badge-name');
    if (badge && name) {
      name.textContent = _PROFILE + ' のページ';
      badge.style.display = 'flex';
    }
  }

  // リロード時: URLハッシュからタブを復元
  const initTab = location.hash.replace('#', '');
  if (['signal', 'scan', 'discovery'].includes(initTab)) switchTab(initTab);

  // 発掘スキャンの前回キャッシュをバックグラウンドで先読み（日本株・米国株両方）
  _fetchDiscCache('jp');
  _fetchDiscCache('us');
});

async function scanAddToWL(e, ticker) {
  e.stopPropagation();
  const btn = document.getElementById(`scan-add-${ticker}`);
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res = await fetch('/api/watchlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_pb({ ticker, memo: '銘柄スキャンから登録' + _todayYMD() })),
    });
    const data = await res.json();
    if (data.success) {
      order = data.watchlist;
      btn.outerHTML = `<span class="in-wl-badge">✓ 登録済</span>`;
      fetchAndRenderAll();
    } else {
      btn.disabled = false;
      btn.textContent = '＋ WL';
      alert(data.error || '追加に失敗しました');
    }
  } catch(err) {
    btn.disabled = false;
    btn.textContent = '＋ WL';
  }
}

function _todayYMD() {
  const d = new Date();
  return d.getFullYear().toString()
    + String(d.getMonth() + 1).padStart(2, '0')
    + String(d.getDate()).padStart(2, '0');
}

function scanEditMemo(e, ticker, el) {
  e.stopPropagation();
  // 現在のメモ値をキャッシュから取得
  const cur = (scanData && scanData.results || []).find(r => r.ticker === ticker);
  const curMemo = cur ? (cur.memo || '') : '';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = curMemo;
  inp.placeholder = 'メモを入力…';
  inp.style.cssText = 'font-size:10px;width:170px;padding:2px 5px;border:1px solid var(--green);background:var(--bg);color:var(--fg);border-radius:3px;outline:none';

  const save = async () => {
    const val = inp.value.trim();
    // ローカルキャッシュ更新
    if (cur) cur.memo = val;
    // 表示更新
    el.innerHTML = val
      ? `<span style="color:var(--muted)">📝 ${escapeHtml(val)}</span>`
      : `<span style="color:var(--border)">📝 メモ追加</span>`;
    // サーバー保存
    await fetch(`/api/metadata/${encodeURIComponent(ticker)}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(_pb({ memo: val })),
    }).catch(() => {});
  };
  inp.onblur  = save;
  inp.onkeydown = ev => {
    if (ev.key === 'Enter')  { inp.blur(); }
    if (ev.key === 'Escape') { inp.value = curMemo; inp.blur(); }
  };
  el.innerHTML = '';
  el.appendChild(inp);
  inp.focus();
  inp.select();
}

// ── 発掘スキャンタブ ─────────────────────────────────────────────────────────
const DISC_INFO = {
  jp: { hint: '日経225＋主要銘柄 約190銘柄', flag: '🇯🇵' },
  us: { hint: 'S&P500主要銘柄 約220銘柄',   flag: '🇺🇸' },
};
let discMarket   = 'jp';
let discData     = { jp: null, us: null };
let _discPolling = false;

// 発掘スキャン: スキャン開始ボタンのラベルを状態に合わせて更新
function _updateDiscBtn() {
  const btn = document.getElementById('btn-disc-start');
  if (!btn) return;
  btn.disabled  = false;
  btn.textContent = discData[discMarket] ? '↻ 再スキャン' : '🔍 スキャン開始';
}

// 発掘スキャン: サーバーのキャッシュ結果を取得してメモリに反映
async function _fetchDiscCache(market) {
  try {
    const res  = await fetch(`/api/discovery?market=${market}`);
    const data = await res.json();
    if (data.status === 'done') {
      discData[market] = data;
      if (market === discMarket) {
        _updateDiscUpdated(data.updated_at);
        _renderDiscResults(data);
        _updateDiscBtn();
      }
    }
  } catch(e) {}
}

function setDiscMarket(m) {
  discMarket = m;
  document.getElementById('disc-btn-jp').classList.toggle('on', m === 'jp');
  document.getElementById('disc-btn-us').classList.toggle('on', m === 'us');
  document.getElementById('disc-market-hint').textContent = DISC_INFO[m].hint;
  _updateDiscUpdated(discData[m] && discData[m].updated_at);
  _renderDiscContent();
  _updateDiscBtn();
  // 未ロードならキャッシュ取得
  if (!discData[m]) _fetchDiscCache(m);
}

function _renderDiscContent() {
  const data = discData[discMarket];
  const el   = document.getElementById('disc-content');
  if (!el) return;
  if (!data) {
    el.innerHTML = `<div class="sig-empty" style="padding:40px 0">
      <div style="font-size:14px;margin-bottom:8px">月足MACDの買いシグナル銘柄を発掘します</div>
      <div style="font-size:12px;color:var(--muted)">${DISC_INFO[discMarket].flag} ${DISC_INFO[discMarket].hint}を対象にスキャン</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">📈 買いシグナル ／ 🔼 上昇トレンド ／ ⏰ 直近GCあり（6ヶ月以内）の3種に分類します</div>
    </div>`;
    return;
  }
  _renderDiscResults(data);
}

async function startDiscovery() {
  const btn = document.getElementById('btn-disc-start');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ スキャン中…'; }
  _showDiscLoading(0, null);
  try { await fetch(`/api/discovery?market=${discMarket}`, { method: 'POST' }); } catch(e) {}
  _discPolling = true;
  _pollDiscovery(Date.now());
}

function _showDiscLoading(elapsed, d) {
  const el  = document.getElementById('disc-content');
  if (!el) return;
  const total   = d && d.total || 0;
  const done    = d && d.done  || 0;
  const pct     = total > 0 ? Math.min(Math.round(done / total * 100), 100) : 0;
  const curName = (d && (d.current_name || d.current)) || '';
  const sec     = Math.round(elapsed / 1000);
  const elStr   = sec > 0 ? (sec >= 60 ? `${Math.floor(sec/60)}分${sec%60}秒` : `${sec}秒`) : '';
  el.innerHTML  = `<div class="sig-empty" style="padding:32px 0;line-height:1.8">
    <div style="font-size:14px;font-weight:600;margin-bottom:2px">${DISC_INFO[discMarket].flag} 📊 MACDデータ取得中</div>
    <div style="background:var(--border);border-radius:4px;height:7px;width:240px;margin:10px auto 6px;overflow:hidden">
      <div style="background:var(--green);width:${pct}%;height:100%;border-radius:4px;transition:width .4s"></div>
    </div>
    ${total > 0 ? `<div style="font-size:12px;color:var(--muted)">${done} / ${total} 銘柄 (${pct}%)</div>` : ''}
    ${curName ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">処理中: <span style="color:var(--green);font-weight:600">${escapeHtml(curName)}</span></div>` : ''}
    <div style="font-size:11px;color:var(--muted);margin-top:8px;opacity:.7">${elStr ? `経過 ${elStr}` : 'スキャン開始中…'}</div>
  </div>`;
}

async function _pollDiscovery(startTime) {
  if (!_discPolling) return;
  try {
    const res  = await fetch(`/api/discovery?market=${discMarket}`);
    const data = await res.json();
    if (data.status === 'done') {
      _discPolling = false;
      discData[discMarket] = data;
      _updateDiscUpdated(data.updated_at);
      _renderDiscResults(data);
      _updateDiscBtn();
    } else if (data.status === 'running') {
      _showDiscLoading(Date.now() - startTime, data);
      setTimeout(() => _pollDiscovery(startTime), 3000);
    } else {
      _discPolling = false;
      _updateDiscBtn();
    }
  } catch(e) {
    _discPolling = false;
    _updateDiscBtn();
  }
}

function _updateDiscUpdated(updated_at) {
  const el = document.getElementById('disc-updated');
  if (!el) return;
  el.textContent = updated_at
    ? new Date(updated_at * 1000).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) + ' 更新'
    : '';
}

function _renderDiscResults(data) {
  const el       = document.getElementById('disc-content');
  if (!el) return;
  const buy      = data.buy       || [];
  const uptrend  = data.uptrend   || [];
  const recentGc = data.recent_gc || [];
  const total    = data.total     || 0;

  function discRow(d) {
    const cfg  = sigCfg(d.signal);
    const isJpy = d.currency === 'JPY';
    const priceFmt = d.current_price != null
      ? (isJpy ? d.current_price.toLocaleString('ja-JP') + '円' : '$' + d.current_price.toFixed(2))
      : '-';
    const chgCls = (d.change || 0) >= 0 ? 'pos' : 'neg';
    const chgStr = d.change_pct != null
      ? `<span class="${chgCls}" style="font-size:11px">${d.change_pct >= 0 ? '+' : ''}${d.change_pct.toFixed(2)}%</span>`
      : '';
    const safeT = escapeHtml(d.ticker);
    const inWL  = order && order.includes(d.ticker);
    const wlBtn = inWL
      ? `<span style="font-size:10px;color:var(--green)">✓ WL</span>`
      : `<button onclick="discAddToWL(event,'${safeT}')" id="dwl-${safeT}">＋ WL</button>`;
    const gcStr = d.last_gc
      ? `<span style="font-size:10px;color:var(--muted)">GC: ${d.last_gc}</span>` : '';
    const secStr = d.sector
      ? `<span style="font-size:10px;background:var(--border);color:var(--fg);padding:1px 6px;border-radius:10px;white-space:nowrap">${escapeHtml(d.sector)}</span>` : '';
    let earlyBadge = '';
    if (isEarlySignal(d)) {
      const wcfg = sigCfg(d.weekly_signal);
      earlyBadge = `<span class="early-mini-badge" title="週足MACDでは月足と異なる動き（${escapeHtml(d.weekly_signal)}）を検知">⚡週足:${wcfg.lbl}</span>`;
    }
    return `<div class="disc-row">
      <div style="flex:1 1 130px">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span class="badge ${cfg.cls}" style="font-size:9px;padding:1px 5px">${cfg.lbl}</span>
          ${secStr}
          ${earlyBadge}
          <span class="disc-name">${escapeHtml(d.name || d.ticker)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
          <span class="disc-ticker">${safeT}</span>${gcStr}
        </div>
        ${d.reason ? `<div style="font-size:10px;color:var(--blue);margin-top:2px;opacity:.85">📌 ${escapeHtml(d.reason)}</div>` : ''}
        ${d.memo ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 ${escapeHtml(d.memo)}</div>` : ''}
      </div>
      <div class="disc-price">${priceFmt} ${chgStr}</div>
      <div class="disc-actions">
        ${wlBtn}
        <button onclick="discAddToScan(event,'${safeT}')" id="dsc-${safeT}">📋 追加</button>
      </div>
    </div>`;
  }

  // セクター別サブヘッダーを挿入しながら行を生成
  function sectionWithSectors(items) {
    if (!items.length) return '';
    let html = '';
    let prevSector = null;
    for (const d of items) {
      const sec = d.sector || '';
      if (sec && sec !== prevSector) {
        html += `<div style="font-size:11px;font-weight:700;color:var(--fg);background:var(--border);padding:4px 8px;border-radius:4px;margin-top:${prevSector !== null ? 10 : 2}px;margin-bottom:2px;letter-spacing:.04em">▸ ${escapeHtml(sec)}</div>`;
        prevSector = sec;
      }
      html += discRow(d);
    }
    return html;
  }

  function section(title, color, condition, items, useSectors) {
    if (!items.length) return '';
    const body = useSectors ? sectionWithSectors(items) : items.map(discRow).join('');
    return `<div class="disc-section">
      <div class="disc-section-title" style="color:${color}">${title}&ensp;<span style="font-weight:400;font-size:11px">${items.length}銘柄</span></div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px;padding-left:2px">条件: ${condition}</div>
      ${body}
    </div>`;
  }

  const found = buy.length + uptrend.length + recentGc.length;
  let html = section('📈 買いシグナル',           'var(--green)',  '月足MACDが今月ゴールデンクロス成立（MACD線がシグナル線を上抜き）',       buy,      true)
           + section('🔼 上昇トレンド',           'var(--blue)',   '月足MACD線＞シグナル線（GC後の上昇トレンド継続中）',                   uptrend,  true)
           + section('⏰ 直近GCあり（6ヶ月以内）', 'var(--orange)', '直近6ヶ月以内にGCが成立した銘柄（現在も上昇トレンド以外のものを含む）', recentGc, false);

  if (!found) {
    html = `<div class="sig-empty">シグナル銘柄は見つかりませんでした（スキャン対象: ${total}銘柄）</div>`;
  } else {
    html += `<div style="font-size:11px;color:var(--muted);text-align:right;margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">${DISC_INFO[discMarket].flag} ${total}銘柄スキャン ／ ${found}銘柄該当</div>`;
  }
  el.innerHTML = html;
}

async function discAddToWL(e, ticker) {
  e.stopPropagation();
  const btn = document.getElementById(`dwl-${ticker}`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const mktLabel = discMarket === 'jp' ? '🇯🇵日本株' : '🇺🇸米国株';
    const res  = await fetch('/api/watchlist', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(_pb({ ticker, memo: `発掘スキャンから登録（${mktLabel}）` + _todayYMD() })),
    });
    const data = await res.json();
    if (data.success) {
      order = data.watchlist;
      if (btn) btn.outerHTML = `<span style="font-size:10px;color:var(--green)">✓ WL</span>`;
      fetchAndRenderAll();
    } else {
      if (btn) { btn.disabled = false; btn.textContent = '＋ WL'; }
      alert(data.error || '追加に失敗しました');
    }
  } catch(err) {
    if (btn) { btn.disabled = false; btn.textContent = '＋ WL'; }
  }
}

async function discAddToScan(e, ticker) {
  e.stopPropagation();
  const btn = document.getElementById(`dsc-${ticker}`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const res  = await fetch('/api/scan-list', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(_pb({ ticker })),
    });
    const data = await res.json();
    if (data.success) {
      scanListData.custom = data.custom;
      scanListData.total  = data.total;
      const el = document.getElementById('scan-total');
      if (el) el.textContent = `対象: ${data.total}銘柄`;
      if (btn) btn.outerHTML = `<span style="font-size:10px;color:var(--blue)">✓ 追加済</span>`;
      // 自動メモ（未設定の場合のみ）
      const mktLabel = discMarket === 'jp' ? '🇯🇵日本株' : '🇺🇸米国株';
      fetch(`/api/metadata/${encodeURIComponent(ticker)}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(_pb({ memo_if_empty: `発掘スキャンから追加（${mktLabel}）` + _todayYMD() })),
      }).catch(() => {});
    } else {
      const already = data.error === 'すでにスキャンリストに含まれています';
      if (btn) btn.outerHTML = already
        ? `<span style="font-size:10px;color:var(--muted)">✓ 登録済</span>`
        : `<button onclick="discAddToScan(event,'${escapeHtml(ticker)}')" id="dsc-${escapeHtml(ticker)}">📋 追加</button>`;
      if (!already) alert(data.error || '追加に失敗しました');
    }
  } catch(err) {
    if (btn) { btn.disabled = false; btn.textContent = '📋 追加'; }
  }
}

// ── シグナル履歴ビュー ──────────────────────────────────────────────────────
function monthsAgo(ym) {
  if (!ym) return null;
  const [y, m] = ym.split('-').map(Number);
  const now = new Date();
  return (now.getFullYear() - y) * 12 + (now.getMonth() + 1 - m);
}

function renderSignalView() {
  const el = document.getElementById('signal-content');
  const items = Object.values(stockData);
  if (!items.length) {
    el.innerHTML = '<div class="sig-empty">データを読み込み中です。ウォッチリストタブで更新してください。</div>';
    return;
  }

  // GC発生日でソート（新しい順）、なしは最後
  const sorted = [...items].sort((a, b) => {
    if (!a.last_gc && !b.last_gc) return 0;
    if (!a.last_gc) return 1;
    if (!b.last_gc) return -1;
    return b.last_gc.localeCompare(a.last_gc);
  });

  // 直近6ヶ月以内にGCがあった銘柄
  const recentGC = sorted.filter(d => {
    const ago = monthsAgo(d.last_gc);
    return ago !== null && ago <= 6;
  });

  // それ以外（GCが古いまたはない）
  const others = sorted.filter(d => {
    const ago = monthsAgo(d.last_gc);
    return ago === null || ago > 6;
  });

  function rowHTML(d) {
    const s = sym(d.currency);
    const cc = d.change >= 0 ? 'pos' : 'neg';
    const sgn = d.change >= 0 ? '+' : '';
    const cfg = sigCfg(d.signal);
    const displayName = (d.custom_name && d.custom_name.trim()) ? d.custom_name : d.name;
    const extUrl = externalUrl(d.symbol, d.ticker);

    const gcAgo = monthsAgo(d.last_gc);
    const gcCell = d.last_gc
      ? `<span class="sig-date-gc">${d.last_gc}</span><span class="sig-months-ago">(${gcAgo}ヶ月前)</span>`
      : '<span class="sig-date-none">—</span>';

    const dcAgo = monthsAgo(d.last_dc);
    const dcCell = d.last_dc
      ? `<span class="sig-date-dc">${d.last_dc}</span><span class="sig-months-ago">(${dcAgo}ヶ月前)</span>`
      : '<span class="sig-date-none">—</span>';

    let earlyCell = '<span class="sig-date-none">—</span>';
    if (isEarlySignal(d)) {
      const wcfg = sigCfg(d.weekly_signal);
      const wdate = d.weekly_signal_date ? `<br><span style="font-size:10px;color:var(--muted)">${d.weekly_signal_date}</span>` : '';
      earlyCell = `<span class="early-mini-badge" title="週足MACDでは月足と逆方向の動きを検知">⚡ ${wcfg.lbl}</span>${wdate}`;
    }

    return `<tr onclick="switchTab('watch'); setTimeout(()=>selectCard('${d.ticker}'),100)">
      <td>
        <div class="sig-name">
          <a class="ext-link" style="font-size:11px;margin-right:4px" href="${extUrl}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">↗</a>
          ${escapeHtml(displayName)}
        </div>
        <div class="sig-ticker">${d.ticker}</div>
      </td>
      <td><span class="badge ${cfg.cls}" style="font-size:10px;padding:2px 8px">${cfg.lbl}</span></td>
      <td class="sig-price">${s}${fmtPrice(d.current_price, d.currency)}<br><span class="${cc}" style="font-size:11px">${sgn}${d.change_pct.toFixed(2)}%</span></td>
      <td>${gcCell}</td>
      <td>${dcCell}</td>
      <td>${earlyCell}</td>
    </tr>`;
  }

  let html = '';

  if (recentGC.length) {
    html += `<div class="sig-section">
      <div class="sig-section-title">⚡ 直近6ヶ月以内に買いシグナル発生 (${recentGC.length}銘柄)</div>
      <table class="sig-table">
        <thead><tr>
          <th>銘柄</th><th>現在シグナル</th><th>現在値</th>
          <th>最終GC（買い）</th><th>最終DC（売り）</th><th>⚡早期シグナル（週足）</th>
        </tr></thead>
        <tbody>${recentGC.map(rowHTML).join('')}</tbody>
      </table>
    </div>`;
  }

  if (others.length) {
    html += `<div class="sig-section">
      <div class="sig-section-title">その他のウォッチリスト銘柄</div>
      <table class="sig-table">
        <thead><tr>
          <th>銘柄</th><th>現在シグナル</th><th>現在値</th>
          <th>最終GC（買い）</th><th>最終DC（売り）</th><th>⚡早期シグナル（週足）</th>
        </tr></thead>
        <tbody>${others.map(rowHTML).join('')}</tbody>
      </table>
    </div>`;
  }

  if (!html) html = '<div class="sig-empty">データがありません</div>';
  el.innerHTML = html;
}
