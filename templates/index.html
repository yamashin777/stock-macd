<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月足MACD ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128;
  --border: #30363d; --text: #e6edf3; --muted: #8b949e;
  --blue: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #f0883e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* ── Header ─────────────────────────────────────── */
header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 11px 20px; display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
}
.hd-title h1 { font-size: 14px; font-weight: 700; }
.hd-title p  { font-size: 11px; color: var(--muted); margin-top: 1px; }
.sb-toggle-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 5px 9px; border-radius: 6px; cursor: pointer; font-size: 15px;
  flex-shrink: 0; transition: all .15s;
}
.sb-toggle-btn:hover { border-color: var(--blue); color: var(--text); }
.hd-form { display: flex; gap: 8px; margin-left: auto; }
.hd-input-wrap { position: relative; width: 260px; }
.hd-input-wrap input {
  width: 100%;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 7px 12px; border-radius: 6px; font-size: 13px;
}
.hd-input-wrap input:focus { outline: none; border-color: var(--blue); }
.hd-input-wrap input::placeholder { color: var(--muted); }
/* オートコンプリートドロップダウン */
.hd-suggest {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 300;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,.55); overflow: hidden; display: none;
}
.hd-suggest.show { display: block; }
.suggest-item {
  padding: 9px 13px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.04); transition: background .1s;
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover, .suggest-item.focused { background: var(--bg3); }
.suggest-name { font-size: 13px; font-weight: 600; color: var(--text); }
.suggest-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.btn {
  background: var(--blue); color: #fff; border: none;
  padding: 7px 16px; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 600; transition: filter .15s; white-space: nowrap;
}
.btn:hover { filter: brightness(1.15); }
.btn:disabled { opacity: .6; cursor: not-allowed; filter: none; }

/* ── Page ────────────────────────────────────────── */
/* ── App layout ──────────────────────────────────── */
.app-body { display: flex; flex: 1; overflow: hidden; }
.page { flex: 1; overflow-y: auto; padding: 16px 18px; }

/* ── Signal sidebar ──────────────────────────────── */
.signal-sidebar {
  width: 200px; min-width: 200px; flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width .2s ease, min-width .2s ease;
}
.signal-sidebar.collapsed { width: 0; min-width: 0; }

.sb-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sb-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.sb-close {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 14px; padding: 1px 4px; transition: color .15s;
}
.sb-close:hover { color: var(--text); }

.sb-body { flex: 1; overflow-y: auto; }
.sb-body::-webkit-scrollbar { width: 4px; }
.sb-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sb-cat { border-bottom: 1px solid var(--border); }
.sb-cat-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 12px; font-size: 11px; font-weight: 700;
  position: sticky; top: 0; z-index: 1;
  background: var(--bg2);
}
.sb-cat-hd.sig-buy     { color: #3fb950; background: #143520; }
.sb-cat-hd.sig-sell    { color: #f85149; background: #351515; }
.sb-cat-hd.sig-bullish { color: #56d364; background: #102819; }
.sb-cat-hd.sig-bearish { color: #ff7b72; background: #281010; }
.sb-cat-hd.sig-neutral { color: #8b949e; background: var(--bg2); }
.sb-count {
  font-size: 10px; font-weight: 700; padding: 1px 5px;
  border-radius: 8px; background: rgba(255,255,255,.08); color: inherit;
}

.sb-item {
  padding: 7px 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.03);
  transition: background .12s;
}
.sb-item:hover { background: var(--bg3); }
.sb-item.sb-active { background: var(--bg3); border-left: 2px solid var(--blue); padding-left: 10px; }

.sb-item-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-item-sub { display: flex; justify-content: space-between; margin-top: 2px; }
.sb-ticker-lbl { font-size: 10px; color: var(--muted); }
.sb-price-lbl  { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }
.sb-empty { padding: 5px 12px 7px; font-size: 11px; color: #484f58; }

/* カテゴリ背景色 */
.sbg-buy     { background: #0e2a18; }
.sbg-sell    { background: #2a0f0f; }
.sbg-bullish { background: #0b1f13; }
.sbg-bearish { background: #1f0c0c; }
.sb-item:hover { background: rgba(255,255,255,.07) !important; }

/* カテゴリドラッグ */
.sb-drag { cursor: grab; color: var(--muted); font-size: 13px; opacity: .3; flex-shrink: 0; user-select: none; }
.sb-cat:hover .sb-drag { opacity: .7; }
.sb-drag:active { cursor: grabbing; }
.sb-cat-ghost { opacity: .35; outline: 1px dashed var(--blue); }

/* ── Grid ────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

/* ── Card ────────────────────────────────────────── */
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 13px 14px; cursor: pointer;
  display: flex; flex-direction: column; gap: 7px;
  transition: border-color .15s, box-shadow .15s;
}
.card:hover { border-color: #444c56; box-shadow: 0 4px 14px rgba(0,0,0,.35); }
.card.active { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }

.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
.card-name {
  font-size: 13px; font-weight: 700; line-height: 1.35;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
}
.card-ticker  { font-size: 11px; color: var(--muted); margin-top: 1px; }
.card-sector  { display: inline-block; font-size: 10px; color: var(--muted);
  background: var(--border); padding: 1px 7px; border-radius: 10px;
  margin-top: 3px; white-space: nowrap; }
.scan-sector-chip { display: inline-block; font-size: 10px; color: var(--muted);
  background: var(--border); padding: 1px 6px; border-radius: 10px;
  white-space: nowrap; margin-top: 2px; }
.rm {
  background: none; border: none; color: #484f58; cursor: pointer;
  font-size: 15px; line-height: 1; padding: 0 3px; flex-shrink: 0;
  transition: color .15s;
}
.rm:hover { color: var(--red); }

.card-price  { font-size: 21px; font-weight: 300; font-variant-numeric: tabular-nums; }
.card-change { font-size: 12px; font-variant-numeric: tabular-nums; }
.pos { color: var(--green); }
.neg { color: var(--red); }

.badge {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 3px 9px; border-radius: 10px; white-space: nowrap; align-self: flex-start;
}
.sig-buy     { background: rgba(63,185,80,.35);    color: #3fb950;
               border: 1px solid rgba(63,185,80,.7);
               box-shadow: 0 0 8px rgba(63,185,80,.45);
               animation: pulse-buy 2s ease-in-out infinite; }
.sig-sell    { background: rgba(248,81,73,.35);    color: #f85149;
               border: 1px solid rgba(248,81,73,.7);
               box-shadow: 0 0 8px rgba(248,81,73,.45);
               animation: pulse-sell 2s ease-in-out infinite; }
.sig-bullish { background: rgba(63,185,80,.12);    color: #56d364; }
.sig-bearish { background: rgba(248,81,73,.12);    color: #ff7b72; }
.sig-neutral { background: rgba(139,148,158,.15);  color: #8b949e; }
.sig-loading { background: rgba(139,148,158,.08);  color: #6e7681; }

@keyframes pulse-buy {
  0%, 100% { box-shadow: 0 0 6px rgba(63,185,80,.4); }
  50%       { box-shadow: 0 0 16px rgba(63,185,80,.85); }
}
@keyframes pulse-sell {
  0%, 100% { box-shadow: 0 0 6px rgba(248,81,73,.4); }
  50%       { box-shadow: 0 0 16px rgba(248,81,73,.85); }
}

.mini-svg { width: 100%; display: block; }

.card-vals {
  display: flex; gap: 4px; font-size: 10px; color: var(--muted);
  font-variant-numeric: tabular-nums; text-align: center;
}
.card-vals > div { flex: 1; background: var(--bg3); border-radius: 4px; padding: 4px 2px; }
.card-vals strong { display: block; font-size: 11px; color: var(--text); margin-top: 1px; }

/* Skeleton */
.skel {
  background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
  background-size: 200% 100%; animation: sh 1.4s infinite; border-radius: 4px;
}
@keyframes sh { to { background-position: -200% 0; } }

/* ── Detail Panel ────────────────────────────────── */
.detail {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px 20px; margin-bottom: 16px;
}
.detail-hd {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
}
.detail-left .d-name { font-size: 18px; font-weight: 700; }
.detail-left .d-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.detail-left .d-sig  { margin-top: 10px; }
.detail-right { text-align: right; }
.detail-right .d-price {
  font-size: 32px; font-weight: 300; font-variant-numeric: tabular-nums;
}
.detail-right .d-change { font-size: 14px; margin-top: 3px; font-variant-numeric: tabular-nums; }
.detail-btns { display: flex; gap: 7px; align-self: flex-start; }
.btn-sm {
  background: var(--bg3); color: var(--muted); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: border-color .15s;
}
.btn-sm:hover { border-color: var(--blue); color: var(--text); }
.btn-close {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: border-color .15s, color .15s;
}
.btn-close:hover { border-color: var(--red); color: var(--red); }

.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
.stat {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 13px;
}
.stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.stat-val { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; font-family: monospace; }

.chart-box {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 13px 15px; margin-bottom: 10px;
}
.chart-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 9px; }
.chart-legend { display:flex; flex-wrap:wrap; gap:14px; align-items:center; margin:8px 0 4px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted);
  position:relative; cursor:help; border-bottom:1px dotted var(--muted); padding-bottom:1px; }
.legend-swatch { display:inline-block; width:14px; height:3px; border-radius:2px; }
.legend-swatch.legend-dash { background:transparent; height:0; border-top:2px dashed; width:14px; }
.legend-swatch.legend-dot { background:transparent; height:0; border-top:2px dotted; width:14px; }
.legend-item::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 8px); left: 0;
  background: #1c2128; color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px; font-size: 11px; line-height: 1.5;
  white-space: normal; width: 240px;
  opacity: 0; visibility: hidden; transform: translateY(4px);
  transition: opacity .15s, transform .15s;
  z-index: 50; box-shadow: 0 4px 12px rgba(0,0,0,.4);
  pointer-events: none;
}
.legend-item:hover::after { opacity: 1; visibility: visible; transform: translateY(0); }
.ch-price { height: 230px; position: relative; }
.ch-macd  { height: 165px; position: relative; }

.period-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.period-lbl { font-size: 11px; color: var(--muted); margin-right: 2px; }
.pbtn {
  background: var(--bg3); border: 1px solid var(--border); color: var(--muted);
  padding: 4px 11px; border-radius: 5px; cursor: pointer; font-size: 12px;
  transition: all .15s;
}
.pbtn:hover { border-color: var(--blue); color: var(--text); }
.pbtn.on { background: var(--blue); border-color: var(--blue); color: #fff; }

/* ── Misc ────────────────────────────────────────── */
.empty-grid {
  grid-column: 1/-1; padding: 60px 20px; text-align: center; color: var(--muted);
}
.empty-grid .ico { font-size: 48px; margin-bottom: 12px; }
.err-card {
  background: var(--bg2); border: 1px solid rgba(248,81,73,.35);
  border-radius: 10px; padding: 14px; color: #ff7b72; font-size: 12px;
  display: flex; flex-direction: column; gap: 6px;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── 市場別カラー ────────────────────────────── */
.card.mkt-jp {
  background: linear-gradient(180deg, rgba(210,70,60,.13) 0%, rgba(210,70,60,.04) 100%);
  border-color: rgba(210, 70, 60, .35);
}
.card.mkt-jp:hover:not(.active) { border-color: rgba(210, 70, 60, .60); }

.card.mkt-us {
  background: linear-gradient(180deg, rgba(55,120,230,.13) 0%, rgba(55,120,230,.04) 100%);
  border-color: rgba(55, 120, 230, .35);
}
.card.mkt-us:hover:not(.active) { border-color: rgba(55, 120, 230, .60); }

/* ── 買い・売りシグナルカード強調 ───────────── */
.card.signal-buy {
  border-color: rgba(63,185,80,.6) !important;
  box-shadow: 0 0 12px rgba(63,185,80,.25), inset 0 0 20px rgba(63,185,80,.06);
}
.card.signal-buy:hover:not(.active) {
  border-color: rgba(63,185,80,.9) !important;
  box-shadow: 0 0 20px rgba(63,185,80,.4);
}
.card.signal-sell {
  border-color: rgba(248,81,73,.6) !important;
  box-shadow: 0 0 12px rgba(248,81,73,.25), inset 0 0 20px rgba(248,81,73,.06);
}
.card.signal-sell:hover:not(.active) {
  border-color: rgba(248,81,73,.9) !important;
  box-shadow: 0 0 20px rgba(248,81,73,.4);
}

/* ── ドラッグ並び替え ────────────────────────── */
.drag-handle {
  color: var(--muted); cursor: grab; font-size: 14px;
  padding: 0 5px 0 0; flex-shrink: 0; opacity: 0.3;
  transition: opacity .15s; user-select: none; line-height: 1;
}
.card:hover .drag-handle { opacity: 0.7; }
.drag-handle:active { cursor: grabbing; }
.card-ghost  { opacity: 0.35; border: 1px dashed var(--blue) !important; background: var(--bg3) !important; }
.card-chosen { box-shadow: 0 8px 24px rgba(0,0,0,.55) !important; transform: rotate(1deg); }

/* ── メモ & 編集 ─────────────────────────────── */
.card-earnings { font-size:10px; color:var(--accent); margin-top:3px; }
.early-mini-badge {
  display: inline-block; font-size: 9px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, #8a2387, #e94057, #f27121);
  padding: 2px 7px; border-radius: 8px; margin-top: 3px;
}
.early-signal-box {
  margin-top: 8px; padding: 8px 12px; border-radius: 10px;
  background: linear-gradient(135deg, #8a2387, #e94057, #f27121);
  background-size: 200% 200%;
  animation: early-signal-glow 3s ease-in-out infinite, early-signal-shift 6s ease infinite;
  box-shadow: 0 0 12px rgba(233,64,87,.5);
}
.early-signal-tag {
  display: inline-block; font-size: 11px; font-weight: 800; color: #fff;
  margin-right: 6px; letter-spacing: .5px;
}
@keyframes early-signal-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(233,64,87,.4); }
  50%      { box-shadow: 0 0 18px rgba(233,64,87,.8); }
}
@keyframes early-signal-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.card-memo { font-size:11px; color:var(--muted); line-height:1.4; margin-top:2px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.btn-edit { background:none; border:none; color:var(--muted); cursor:pointer;
  font-size:14px; padding:3px 5px; transition:color .15s; flex-shrink:0; }
.btn-edit:hover { color:var(--blue); }
.detail-memo { background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; margin-bottom:10px; font-size:13px; color:var(--text);
  white-space:pre-wrap; line-height:1.6; min-height:36px; }
.memo-link { color:var(--blue); text-decoration:underline; word-break:break-all; }
.memo-link:hover { opacity:.75; }
.detail-memo-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.detail-memo-lbl { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
/* AI解説 */
.ai-section { margin-bottom:12px; }
.ai-section-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;
  position:relative; }
.ai-section-lbl { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.ai-comment-box { background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; font-size:13px; color:var(--text); line-height:1.75; min-height:36px; }
.ai-comment-box.loading { color:var(--muted); font-style:italic; }
.ai-comment-box.error   { color:#f85149; font-size:12px; }
/* AI プロンプト確認ツールチップ */
.ai-prompt-info {
  display:inline-flex; align-items:center; justify-content:center;
  width:14px; height:14px; border-radius:50%;
  background:var(--border); color:var(--muted);
  font-size:9px; font-weight:700; font-style:normal;
  cursor:help; margin-left:5px; vertical-align:middle;
  flex-shrink:0;
}
.ai-prompt-popup {
  display:none; position:absolute;
  bottom:calc(100% + 8px); left:0; right:0;
  max-height:260px; overflow-y:auto;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px;
  font-size:11px; color:var(--text); line-height:1.65;
  white-space:pre-wrap; word-break:break-all;
  z-index:300; box-shadow:0 4px 16px rgba(0,0,0,.4);
  text-transform:none; letter-spacing:normal; font-weight:400;
}
.ai-prompt-popup-title {
  font-size:10px; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.5px;
  margin-bottom:6px; border-bottom:1px solid var(--border); padding-bottom:4px;
}
.ai-section-hd:has(.ai-prompt-info:hover) .ai-prompt-popup { display:block; }
/* ── ニュースセクション ── */
.news-section { margin-top:16px; }
.news-section-title { font-size:11px; font-weight:600; color:var(--muted);
  text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.news-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:5px; }
.news-item { background:var(--bg3); border:1px solid var(--border); border-radius:6px;
  padding:7px 10px; display:flex; gap:8px; align-items:baseline; }
.news-date { font-size:10px; color:var(--muted); white-space:nowrap; flex-shrink:0; }

.btn-ai { background:rgba(99,102,241,.15); color:#818cf8; border:1px solid rgba(99,102,241,.4);

/* ── モーダル ────────────────────────────────── */

/* ── タブナビゲーション ──────────────────────────── */

}
.tab-btn {
  background: none; border: none; color: var(--muted);

}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── タブツールチップ ────────────────────────────── */
.tab-btn { position: relative; }
.tab-tip {
  position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 13px; font-size: 11px; color: var(--muted); line-height: 1.55;
  white-space: normal; text-align: left; min-width: 210px; max-width: 260px;
  pointer-events: none; opacity: 0; transition: opacity .15s;
  box-shadow: 0 6px 20px rgba(0,0,0,.6); z-index: 500; font-weight: 400;
}
.tab-tip::after {
  content: ''; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  border: 6px solid transparent; border-bottom-color: var(--border);
}
/* 右端タブは右寄せ */
#tab-discovery .tab-tip { left: auto; right: 0; transform: none; }
#tab-discovery .tab-tip::after { left: auto; right: 18px; transform: none; bottom: 100%; }

/* ── シグナル履歴ビュー ──────────────────────────── */

.scan-custom-tag button {

/* ── 発掘スキャンタブ ────────────────────────────────────────────────────────── */

}
/* デスクトップでチャートを広く */

}
@media (min-width: 1024px) {
  .scan-inline-chart { flex: 0 0 220px; }
}

}

@media (max-width: 600px) {

}
</style>
</head>

<script>
// ── プロファイル設定 ────────────────────────────────────────────────────────
// URL ?profile=xxx でプロファイルを切り替え（例: ?profile=dad）
const _PROFILE = (new URLSearchParams(location.search).get('profile') || '').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 20);

/**
 * API URL にプロファイルパラメータを付加するヘルパー
 * _pq('/api/watchlist') → '/api/watchlist?profile=dad'
 */
function _pq(url) {
  if (!_PROFILE) return url;
  return url + (url.includes('?') ? '&' : '?') + 'profile=' + encodeURIComponent(_PROFILE);
}

/** fetch の body JSON にプロファイルを付加 */

// ── Autocomplete ───────────────────────────────────────────────────────────
let suggestTimer = null;
let suggestIndex = -1;

function initAutocomplete() {
  const input = document.getElementById('t-input');

  input.addEventListener('input', () => {
    clearTimeout(suggestTimer);
    const q = input.value.trim();
    if (q.length < 1) { hideSuggest(); return; }
    suggestTimer = setTimeout(() => fetchSuggest(q), 280);
  });

  input.addEventListener('keydown', e => {
    const items = document.querySelectorAll('.suggest-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      suggestIndex = Math.min(suggestIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('focused', i === suggestIndex));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      suggestIndex = Math.max(suggestIndex - 1, 0);
      items.forEach((el, i) => el.classList.toggle('focused', i === suggestIndex));
    } else if (e.key === 'Enter') {
      if (suggestIndex >= 0 && items[suggestIndex]) {
        items[suggestIndex].click();
        e.preventDefault();
      }
    } else if (e.key === 'Escape') {
      hideSuggest();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.hd-input-wrap')) hideSuggest();
  });
}

async function fetchSuggest(q) {
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    showSuggest(data.results || []);
  } catch(e) { hideSuggest(); }
}

function showSuggest(results) {
  const el = document.getElementById('hd-suggest');
  suggestIndex = -1;
  if (!results.length) { hideSuggest(); return; }
  el.innerHTML = results.map(r => {
    const disp = r.symbol.endsWith('.T') ? r.symbol.slice(0, -2) : r.symbol;
    return `<div class="suggest-item" onclick="selectSuggest('${disp}')">
      <div class="suggest-name">${escapeHtml(r.name)}</div>
      <div class="suggest-sub">${r.symbol}　${r.exchange}</div>
    </div>`;
  }).join('');
  el.classList.add('show');
}

function hideSuggest() {
  document.getElementById('hd-suggest').classList.remove('show');
  suggestIndex = -1;
}

function selectSuggest(ticker) {
  document.getElementById('t-input').value = ticker;
  hideSuggest();
  document.getElementById('t-input').focus();
}

const SIG = {
  '買い':        { cls: 'sig-buy',     lbl: '★ 買いシグナル (GC)' },
  '売り':        { cls: 'sig-sell',    lbl: '★ 売りシグナル (DC)' },
  '上昇トレンド':{ cls: 'sig-bullish', lbl: '↑ 上昇トレンド' },
  '下降トレンド':{ cls: 'sig-bearish', lbl: '↓ 下降トレンド' },
  '様子見':      { cls: 'sig-neutral', lbl: '━ 様子見' },
};
const sigCfg = s => SIG[s] || { cls: 'sig-neutral', lbl: s };

// シグナルタイプを方向（上向き=1 / 下向き=-1 / 中立=0）に変換
// buyと bullish、sellとbearish は「同方向」としてまとめて扱う（誤検知防止）
const SIGNAL_DIR = { buy: 1, bullish: 1, sell: -1, bearish: -1, neutral: 0 };

/**
 * 早期シグナル判定: 月足の方向と週足の方向が「逆」の場合に検知する。
 * 例: 月足がまだ上昇方向（買い/上昇トレンド）なのに、週足はもう下降方向
 *     （売り/下降トレンド）に転じている → 月足が確定する前の早期警告。
 * 月足と週足が同方向（buy×bullishなど）の場合は誤検知防止のため対象外。
 */
function isEarlySignal(d) {
  if (!d.weekly_signal_type || !d.signal_type) return false;
  const wDir = SIGNAL_DIR[d.weekly_signal_type] ?? 0;
  const mDir = SIGNAL_DIR[d.signal_type] ?? 0;
  if (wDir === 0) return false;          // 週足が様子見なら早期シグナルなし
  return wDir !== mDir;                  // 方向が食い違っていれば早期シグナル
}

/** 週足MACDによる早期シグナル（月足の買い/売り確定前に方向の食い違いを検知）を表示するHTMLを生成 */
function earlySignalHtml(data) {
  if (!isEarlySignal(data)) return '';
  const wcfg = sigCfg(data.weekly_signal);
  const dateStr = data.weekly_signal_date ? ` (${data.weekly_signal_date})` : '';
  return `<div class="early-signal-box">
    <span class="early-signal-tag">⚡ 早期シグナル検知</span>
    <span style="font-size:11px;color:#fff;opacity:.9">月足確定前に週足MACDで動きを検知しました</span><br>
    <span class="badge ${wcfg.cls}" style="font-size:12px;padding:4px 12px;margin-top:5px;display:inline-block">週足: ${wcfg.lbl}</span>
    <span style="font-size:10px;color:#fff;opacity:.75">${dateStr}</span>
  </div>`;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getSlice(chart, months) {
  const n = chart.dates.length;
  const from = (months === null || months >= n) ? 0 : Math.max(0, n - months);
  const s = k => chart[k].slice(from);
  return {
    dates: s('dates'), close: s('close'),
    macd: s('macd'), signal: s('signal'), histogram: s('histogram'),
  };
}

function applyPeriod(months) {

function fmtPrice(p, cur) {
  return cur === 'JPY'
    ? p.toLocaleString('ja-JP', { maximumFractionDigits: 0 })
    : p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── SVG mini chart ─────────────────────────────────────────────────────────
function miniSVG(closes, histograms, uid) {
  const W = 200, H = 74, PH = 44, MH = H - PH - 2;
  const n = Math.min(20, closes.length);
  const c = closes.slice(-n);
  // null values in histogram (MACD warmup) → treat as 0
  const h = histograms.slice(-n).map(v => v === null ? 0 : v);
  if (n < 2) return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}"></svg>`;

  // Price line
  const minC = Math.min(...c), maxC = Math.max(...c), rC = maxC - minC || 1;
  const py = v => PH - 3 - ((v - minC) / rC) * (PH - 8);
  const px = i => (i / (n - 1)) * W;
  const pts = c.map((v, i) => `${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  const fill = `0,${PH} ${pts} ${W},${PH}`;

  // MACD bars
  const maxH = Math.max(...h.map(Math.abs)) || 1;
  const bw = (W / n) * 0.72;
  const midY = PH + 2 + MH / 2;
  const bars = h.map((v, i) => {
    const bh = Math.max(1, Math.abs(v) / maxH * (MH / 2 - 1));
    const x  = (i / n) * W + (W / n) * 0.14;
    const y  = v >= 0 ? midY - bh : midY;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${v >= 0 ? '#3fb950' : '#f85149'}" rx="0.5"/>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${fill}" fill="url(#g${uid})"/>
    <polyline points="${pts}" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="0" y1="${midY}" x2="${W}" y2="${midY}" stroke="#21262d" stroke-width="0.5"/>
    ${bars}
  </svg>`;
}

function selectCard(t) {
  if (active === t) { closeDetail(); return; }

  active = t;
  document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
  document.getElementById('card-' + t)?.classList.add('active');
  updateSidebarActive(t);

  const d = stockData[t];
  if (d) { renderDetail(d); return; }

  fetch(_pq('/api/stock/' + t)).then(r => r.json()).then(data => {
    stockData[t] = data;
    if (active === t) renderDetail(data);
  });
}

let _aiRetryTimer = null;

function _updatePromptTooltip(promptText) {
  const el = document.getElementById('ai-prompt-popup-text');
  const icon = document.getElementById('ai-prompt-info-icon');
  if (el) el.textContent = promptText || '（プロンプト情報なし）';
  if (icon) icon.style.display = promptText ? '' : 'none';
}

async function fetchAiComment(force = false) {
  const box = document.getElementById('ai-comment-box');
  const btn = document.getElementById('btn-ai-fetch');
  if (!box || !detailData) return;

  // 進行中のタイマーをキャンセル
  if (_aiRetryTimer) { clearInterval(_aiRetryTimer); _aiRetryTimer = null; }

  box.className = 'ai-comment-box loading';
  box.textContent = '🤖 AIが月足MACDデータを分析中です…';
  if (btn) { btn.style.display = 'none'; btn.disabled = true; }
  // プロンプト取得中表示
  _updatePromptTooltip('取得中…');

  try {
    const res = await fetch('/api/ai-comment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ticker:          detailData.ticker,
        name:            detailData.name,
        signal:          detailData.signal,
        macd_value:      detailData.macd_value,
        signal_value:    detailData.signal_value,
        histogram_value: detailData.histogram_value,
        current_price:   detailData.current_price,
        change_pct:      detailData.change_pct,
        currency:        detailData.currency,
        last_gc:         detailData.last_gc,
        last_dc:         detailData.last_dc,
        force:           force,
      }),
    });

    const data = await res.json();
    // プロンプトをツールチップに反映
    if (data.prompt_used) _updatePromptTooltip(data.prompt_used);
    if (data.comment) {
      box.className = 'ai-comment-box';
      const truncNote = data.finish_reason === 'MAX_TOKENS'
        ? `<div style="font-size:10px;color:#e3b341;margin-top:6px">⚠ 文字数制限により途中で終了しました。↻ 再取得をお試しください。</div>`
        : '';
      const dateHtml = data.fetched_at
        ? `<div style="font-size:10px;color:var(--muted);margin-top:8px">📅 取得日時: ${escapeHtml(data.fetched_at)}${data.stale ? '（制限中のため古い情報）' : ''}</div>`
        : '';
      box.innerHTML = escapeHtml(data.comment).replace(/\n/g, '<br>') + truncNote + dateHtml;
    } else if (res.status === 429 || data.error === 'rate_limit') {
      box.className = 'ai-comment-box error';
      box.innerHTML =
        '⚠️ API利用制限中です。<br>' +
        'しばらく時間をおいてから <b>↻ 再取得</b> ボタンをお試しください。<br>' +
        '<span style="font-size:10px;color:var(--muted)">Gemini無料枠のリセットは日本時間 16〜17時頃です。</span>';
    } else {
      box.className = 'ai-comment-box error';
      box.textContent = data.message || data.error || 'AI解説の取得に失敗しました';
    }
  } catch(err) {
    box.className = 'ai-comment-box error';
    box.textContent = '通信エラーが発生しました。↻ 再取得をお試しください。';
  }
  if (btn) { btn.style.display = ''; btn.disabled = false; }
}

// ── ニュース取得 ────────────────────────────────────────────────────────────
async function fetchNews(ticker) {
  const loading = document.getElementById('news-loading');
  const list    = document.getElementById('news-list');
  if (!loading || !list) return;
  loading.style.display = '';
  list.style.display = 'none';
  list.innerHTML = '';
  try {
    const res  = await fetch(_pq(`/api/news/${encodeURIComponent(ticker)}`));
    const data = await res.json();
    const items = data.news || [];
    if (items.length === 0) {
      loading.textContent = 'ニュースが見つかりませんでした';
      return;
    }
    items.forEach(n => {
      const li = document.createElement('li');
      li.className = 'news-item';
      const titleEl = n.url
        ? `<a href="${escapeHtml(n.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(n.title)}</a>`
        : escapeHtml(n.title);
      li.innerHTML = `
        <span class="news-date">${escapeHtml(n.date || '')}</span>
        <span class="news-title">${titleEl}</span>`;
      list.appendChild(li);
    });
    loading.style.display = 'none';
    list.style.display = '';
  } catch(e) {
    loading.textContent = 'ニュースの取得に失敗しました';
  }
}

// ── MACD signal annotation builder ────────────────────────────────────────
// weeklyStartIdx: この index 以降のクロスは週足データによる検出のため、
//                 月足クロス（緑/赤）とは別の配色（紫/金）で区別する
// estimateStartIdx: この index 以降は次月推定（仮定ベース）のクロスのため、
//                    グレーで区別する
function buildMacdAnnotations(dates, macd, signal, weeklyStartIdx = -1, estimateStartIdx = -1, estimateMonthLabel = '') {
  const ann = {};
  let n = 0;
  const estSuffix = estimateMonthLabel ? `(${estimateMonthLabel}推定)` : '(推定)';
  for (let i = 1; i < dates.length; i++) {
    if (macd[i] == null || signal[i] == null || macd[i-1] == null || signal[i-1] == null) continue;
    const gc = macd[i-1] <= signal[i-1] && macd[i] > signal[i];  // golden cross → 買い
    const dc = macd[i-1] >= signal[i-1] && macd[i] < signal[i];  // dead cross   → 売り
    if (!gc && !dc) continue;

    const isEstimate = estimateStartIdx >= 0 && i >= estimateStartIdx;
    // weeklyStartIdx以降（境界の橋渡し点を含む）は週足データに基づくクロス
    const isWeekly = !isEstimate && weeklyStartIdx >= 0 && i >= weeklyStartIdx;
    const color = isEstimate
      ? (gc ? '#f0c040' : '#f08040')   // 推定: 買い=琥珀, 売り=オレンジ（週足と明確に区別）
      : isWeekly
      ? (gc ? '#d2a8ff' : '#b0c8ff')   // 週足: 買い=紫, 売り=水色
      : (gc ? '#3fb950' : '#f85149');  // 月足: 買い=緑, 売り=赤
    const suffix = isEstimate ? estSuffix : isWeekly ? '(週)' : '';
    const text  = (gc ? '▲ 買い' : '▼ 売り') + suffix;

    ann[`sig_${n++}`] = {
      type: 'line',
      xMin: dates[i], xMax: dates[i],            // ISO date string
      borderColor: color + '55',
      borderWidth: 1.5,
      borderDash: isEstimate ? [1, 3] : isWeekly ? [2, 2] : [4, 3],
      label: {
        display: true,
        content: text,
        position: gc ? 'end' : 'start',          // 買い→上端, 売り→下端
        backgroundColor: color + 'e0',
        color: (isWeekly || isEstimate) ? '#000' : '#fff',
        font: { size: 10, weight: 700 },
        padding: { x: 6, y: 3 },
        borderRadius: 4,
        yAdjust: gc ? -2 : 2,
      },
    };
  }
  return ann;
}

function _legendOnHover(evt, legendItem) {
  // "7月推定"などの動的キーを"当月推定"にフォールバックして辞書を引く
  const normalized = legendItem.text.replace(/\d+月推定/, '当月推定');
  const tip = LEGEND_TIPS[legendItem.text] || LEGEND_TIPS[normalized];
  if (!tip) return;
  const el = _getLegendTipEl();
  el.textContent = tip;
  el.style.display = 'block';
  const x = evt.native ? evt.native.clientX : evt.x;
  const y = evt.native ? evt.native.clientY : evt.y;
  el.style.left = (x + 12) + 'px';

function drawCharts(data) {
  const { dates: rawDates, close, macd, signal, histogram } = getSlice(data.chart, currentPeriod);
  const s = sym(data.currency), cur = data.currency;

  // "YYYY-MM" → "YYYY-MM-01"、"YYYY-MM-DD" はそのまま
  const toISO = d => (d && d.length === 7) ? d + '-01' : d;
  const dates = rawDates.map(toISO);

  // 直近1ヶ月分の週足データを「月足の本当の最終点」の後ろに追加する
  let mDates = dates, mClose = close, mHist = histogram, mMacd = macd, mSignal = signal;
  let weeklyClose = null, weeklyHist = null, weeklyMacd = null, weeklySig = null, weeklyStartIdx = -1;
  const wr = data.weekly_recent;
  if (wr && wr.dates && wr.dates.length && dates.length) {
    const baseLen = dates.length;  // 月足は全て残す（最終点も含む）
    // 週足ラベルも年月日をフル表示（間引き表示時に年が消えて時系列が分かりにくくなるのを防ぐ）
    mDates = dates.concat(wr.dates);
    weeklyStartIdx = baseLen;

    mClose = close.concat(Array(wr.dates.length).fill(null));
    weeklyClose = Array(Math.max(0, baseLen - 1)).fill(null)
      .concat([close[baseLen - 1]])
      .concat(wr.close);

    mHist = histogram.concat(Array(wr.dates.length).fill(null));
    weeklyHist = Array(baseLen).fill(null).concat(wr.histogram);

    mMacd = macd.concat(Array(wr.dates.length).fill(null));
    weeklyMacd = Array(Math.max(0, baseLen - 1)).fill(null)
      .concat([macd[baseLen - 1]])   // 接続点（月足の本当の最終値＝バッジと同じ値）
      .concat(wr.macd);

    mSignal = signal.concat(Array(wr.dates.length).fill(null));
    weeklySig = Array(Math.max(0, baseLen - 1)).fill(null)
      .concat([signal[baseLen - 1]])
      .concat(wr.signal);
  }

  // 次月推定（現在値で据え置きと仮定した参考値）を末尾にもう1点追加
  let estimateClose = null, estimateMacd = null, estimateSig = null, estimateStartIdx = -1;
  if (data.next_month_label && data.next_month_macd != null) {
    const beforeLen = mDates.length;
    estimateStartIdx = beforeLen;
    // 推定点は「最後の週足データの7日後」に配置（月末だとX軸が大きく伸びるため）
    const lastWDate = wr && wr.dates.length ? wr.dates[wr.dates.length - 1] : null;
    let estimateISODate;
    if (lastWDate) {
      const d = new Date(lastWDate);
      d.setDate(d.getDate() + 7);
      estimateISODate = d.toISOString().slice(0, 10);
    } else {
      const [estY2, estM2] = data.next_month_label.split('-').map(Number);
      const estLastDay = new Date(estY2, estM2, 0).getDate();
      estimateISODate = `${estY2}-${String(estM2).padStart(2,'0')}-${String(estLastDay).padStart(2,'0')}`;
    }
    mDates = mDates.concat([estimateISODate]);
    mClose = mClose.concat([null]);
    mHist  = mHist.concat([null]);
    mMacd  = mMacd.concat([null]);
    mSignal = mSignal.concat([null]);
    if (weeklyClose) weeklyClose = weeklyClose.concat([null]);
    if (weeklyHist)  weeklyHist  = weeklyHist.concat([null]);
    if (weeklyMacd)  weeklyMacd  = weeklyMacd.concat([null]);
    if (weeklySig)   weeklySig   = weeklySig.concat([null]);

    const bridgeClose = weeklyClose ? weeklyClose[beforeLen - 1] : mClose[beforeLen - 1];
    const bridgeMacd   = weeklyMacd ? weeklyMacd[beforeLen - 1] : mMacd[beforeLen - 1];
    const bridgeSig     = weeklySig  ? weeklySig[beforeLen - 1]  : mSignal[beforeLen - 1];
    estimateClose = Array(Math.max(0, beforeLen - 1)).fill(null).concat([bridgeClose, data.current_price]);
    estimateMacd  = Array(Math.max(0, beforeLen - 1)).fill(null).concat([bridgeMacd, data.next_month_macd]);
    estimateSig   = Array(Math.max(0, beforeLen - 1)).fill(null).concat([bridgeSig, data.next_month_signal_val]);
  }

  // クロス注釈用: 月足/週足/次月推定のいずれかの値を採用したマージ系列
  const mergedMacd   = mMacd.map((v, i) => v ?? (weeklyMacd ? weeklyMacd[i] : null) ?? (estimateMacd ? estimateMacd[i] : null));
  const mergedSignal = mSignal.map((v, i) => v ?? (weeklySig ? weeklySig[i] : null) ?? (estimateSig ? estimateSig[i] : null));

  // 推定月のラベル（例: "7月"）
  const estYM2 = data.next_month_label || '';
  const estMonthLabel = estYM2 ? parseInt(estYM2.split('-')[1]) + '月' : '';
  const _legEl = document.getElementById('legend-est-label');
  if (_legEl) _legEl.textContent = (estMonthLabel || '当月') + '推定（仮定ベースの参考値）';

  // 週足セクションの開始位置を示す縦の区切り線（price/MACD共通）
  const weeklyDividerDate = (weeklyStartIdx > 0 && wr && wr.dates.length) ? wr.dates[0] : null;
  const estimateDividerDate = (estimateStartIdx > 0 && wr && wr.dates.length) ? wr.dates[wr.dates.length - 1] : null;
  const dividerAnnotation = weeklyDividerDate ? {
    weeklyDivider: {
      type: 'line', xMin: weeklyDividerDate, xMax: weeklyDividerDate,
      borderColor: '#e6b800', borderWidth: 1.5, borderDash: [2, 2],
      label: { display: true, content: '直近1ヶ月は週足', position: 'start',
        backgroundColor: '#e6b800e0', color: '#000', font: { size: 9, weight: 700 },
        padding: { x: 5, y: 2 }, borderRadius: 3, yAdjust: 14, rotation: 0 },
    },
  } : {};
  if (estimateDividerDate) {
    dividerAnnotation.estimateDivider = {
      type: 'line', xMin: estimateDividerDate, xMax: estimateDividerDate,
      borderColor: '#8b949e', borderWidth: 1.5, borderDash: [1, 3],
      label: { display: true, content: (estMonthLabel || '当月') + 'は推定値', position: 'end',
        backgroundColor: '#8b949ee0', color: '#000', font: { size: 9, weight: 700 },
        padding: { x: 5, y: 2 }, borderRadius: 3, yAdjust: -14, rotation: 0 },
    };
  }
  // 当月推定シグナルを推定点に表示
  if (estimateStartIdx > 0 && data.next_month_label && data.next_month_signal_type && data.next_month_signal_type !== 'neutral') {
    const ei = estimateStartIdx;
    // 推定日が週足の最終日以前の場合は重複・逆転になるため非表示
    const lastWeeklyDate = wr && wr.dates.length ? wr.dates[wr.dates.length - 1] : '';
    const isDelayedOverlap = lastWeeklyDate && mDates[ei] <= lastWeeklyDate;
    // 推定点でクロスが既に検出されている場合も非表示（buildMacdAnnotationsが担当）
    const hasCrossAtEstimate = ei > 0 &&
      mergedMacd[ei] != null && mergedMacd[ei-1] != null &&
      mergedSignal[ei] != null && mergedSignal[ei-1] != null &&
      ((mergedMacd[ei-1] <= mergedSignal[ei-1] && mergedMacd[ei] > mergedSignal[ei]) ||
       (mergedMacd[ei-1] >= mergedSignal[ei-1] && mergedMacd[ei] < mergedSignal[ei]));
    if (!hasCrossAtEstimate && !isDelayedOverlap) {
      const estGc = data.next_month_signal_type === 'buy' || data.next_month_signal_type === 'bullish';
      const estColor = estGc ? '#f0c040' : '#f08040';
      dividerAnnotation.estimateSignal = {
        type: 'line', xMin: mDates[ei], xMax: mDates[ei],
        borderColor: estColor + '55', borderWidth: 1.5, borderDash: [1, 3],
        label: { display: true,
          content: (estGc ? '▲ 買い' : '▼ 売り') + `(${estMonthLabel || '当月'}推定)`,
          position: estGc ? 'end' : 'start',
          backgroundColor: estColor + 'e0',
          color: '#000', font: { size: 10, weight: 700 },
          padding: { x: 6, y: 3 }, borderRadius: 4,
          yAdjust: estGc ? -2 : 2 },

// ── Add / Remove / Refresh ─────────────────────────────────────────────────
async function addTicker() {
  const input = document.getElementById('t-input');
  const btn   = document.getElementById('add-btn');
  const t     = input.value.trim().toUpperCase();
  if (!t) return;

  btn.textContent = '検証中…'; btn.disabled = true;
  try {
    const res  = await fetch('/api/watchlist', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_pb({ ticker: t })),
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }

    input.value = '';
    order = data.watchlist;
    renderGrid();

    // Fetch data for the newly added ticker
    const added = data.watchlist[data.watchlist.length - 1];
    fetch(_pq('/api/stock/' + added)).then(r => r.json()).then(d => {
      stockData[added] = d;
      renderGrid();
    });
  } catch (e) {
    alert('エラー: ' + e.message);
  } finally {
    btn.textContent = '＋ 追加'; btn.disabled = false;
  }
}

async function removeCard(e, t) {
  e.stopPropagation();
  const res  = await fetch(_pq('/api/watchlist/' + t), { method: 'DELETE' });
  const data = await res.json();
  if (!data.watchlist) return;

  delete stockData[t];
  order = data.watchlist;
  if (active === t) { active = null; destroyCharts(); document.getElementById('detail').style.display = 'none'; }
  renderGrid();
}

async function refreshCard(t) {
  delete stockData[t];
  renderGrid();
  const res  = await fetch(_pq('/api/stock/' + t));
  const data = await res.json();
  stockData[t] = data;
  renderGrid();
  if (active === t) renderDetail(data);
}

// ── Drag-to-reorder ────────────────────────────────────────────────────────
function initSortable() {
  if (sortableInst) { sortableInst.destroy(); sortableInst = null; }
  const grid = document.getElementById('grid');
  if (!grid || !order.length) return;

  sortableInst = Sortable.create(grid, {
    animation: 180,
    handle: '.drag-handle',
    filter: '.rm, .btn-edit',
    preventOnFilter: true,
    ghostClass: 'card-ghost',
    chosenClass: 'card-chosen',
    onEnd: async function() {
      // Read new order from DOM
      const newOrder = Array.from(
        grid.querySelectorAll('.card[id^="card-"]')
      ).map(el => el.id.slice(5));  // strip "card-"

      order = newOrder;

      try {
        await fetch('/api/watchlist/order', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(_pb({ order: newOrder })),
        });
      } catch(e) {
        console.error('順序保存エラー:', e);
      }
    },
  });
}

  document.getElementById('edit-modal').classList.add('hidden');

async function saveModal() {
  if (!modalTicker) return;
  const btn  = document.getElementById('modal-save-btn');
  const name = document.getElementById('modal-name').value.trim();
  const memo = document.getElementById('modal-memo').value;
  btn.textContent = '保存中…'; btn.disabled = true;
  try {
    const res  = await fetch('/api/metadata/' + modalTicker, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_pb({ custom_name: name, memo })),
    });
    const saved = await res.json();
    if (!saved.success) { alert('保存に失敗しました'); return; }
    if (stockData[modalTicker]) {
      stockData[modalTicker].custom_name = saved.custom_name;
      stockData[modalTicker].memo        = saved.memo;
    }
    closeModal();
    renderGrid();
    if (active === modalTicker && detailData) {
      detailData.custom_name = saved.custom_name;
      detailData.memo        = saved.memo;
      renderDetail(detailData);
    }
  } catch(e) {
    alert('エラー: ' + e.message);
  } finally {
    btn.textContent = '保存'; btn.disabled = false;
  }
}
